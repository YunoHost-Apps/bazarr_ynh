#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "bazarr"
name = "Bazarr"
description.en = "Automated subtitle downloading for Sonarr and Radarr"
description.fr = "Téléchargement automatique de sous-titres pour Sonarr et Radarr"

version = "1.6.0~ynh1"

maintainers = ["tituspijean"]

[upstream]
license = "GPL-3.0"
website = "https://bazarr.media"
admindoc = "https://wiki.bazarr.media"
code = "https://github.com/morpheus65535/bazarr"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true
ldap = false
sso = false
disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/bazarr"

    [install.admin]
    type = "user"

[resources]
        [resources.sources.main]
        url = "https://github.com/morpheus65535/bazarr/releases/download/v1.6.0/bazarr.zip"
        sha256 = "9c7523258bde58528d53acc91239774215e44e4f31d28cb2fb1c620ecdaef7b3"
        in_subdir = false
        autoupdate.strategy = "latest_github_release"
        autoupdate.asset = "^bazarr.zip$"

    [resources.system_user]

    [resources.install_dir]

    [resources.ports]

    [resources.permissions]
    main.url = "/"
    main.allowed = "admins"
    api.url = "/api"
    api.allowed = "visitors"
    api.show_tile = false
    api.protected = true

    [resources.apt]
    packages = "libxml2-dev, libxslt1-dev, unar, ffmpeg, python3-venv"
